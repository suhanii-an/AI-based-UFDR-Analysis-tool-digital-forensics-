<!DOCTYPE html>
<html>

<head>
<title>UFDR AI Forensics Investigator</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
width:70%;
margin:auto;
margin-top:60px;
}

h1{
color:#38bdf8;
margin-bottom:40px;
}

input{
width:60%;
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
margin-left:10px;
background:#38bdf8;
border:none;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
background:#1e293b;
}

th,td{
padding:12px;
border:1px solid #334155;
}

th{
background:#38bdf8;
color:black;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Digital Forensics Investigator</h1>

<input id="query" placeholder="Ask investigation question...">

<button onclick="askQuery()">Run Investigation</button>

<button onclick="getInsights()">Run Intelligence</button>

<div id="results"></div>

</div>

<script>

async function askQuery(){

let question=document.getElementById("query").value

let response=await fetch("http://127.0.0.1:8000/query",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:question})
})

let data=await response.json()

displayResults(data.result)

}

function displayResults(results){

let html="<table>"

html+="<tr><th>Caller</th><th>Receiver</th><th>Duration</th><th>Timestamp</th></tr>"

for(let r of results){

html+=`<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
</tr>`

}

html+="</table>"

document.getElementById("results").innerHTML=html

}

async function getInsights(){

let response=await fetch("http://127.0.0.1:8000/insights")

let data=await response.json()

alert("Forensic intelligence analysis complete")

}

</script>

</body>

</html>
